// Nightvision Configuration. 
// This Nightvision version developed by Leo_[BH] to be more comfortable for eye, flicker-free and improve FPS. 

// Nightvision lighting ["b"-darkest // "y"-brightest] 
zp_nvision_light "m"

// Give nightvision to player [0-disabled // 1-give only // 2-give and enable] 

// Zombie 
zp_nvision_zombie 1

// Human  
zp_nvision_human 0

// Spectator 
zp_nvision_spec 1

// Nemesis 
zp_nvision_nemesis 2

// Survivor 
zp_nvision_survivor 1

